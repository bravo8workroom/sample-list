# Supabase 무료 플랜은 7일간 요청이 전혀 없으면 프로젝트를 일시중지합니다.
# 3일마다 가벼운 REST 요청 1건을 보내 깨어있게 유지합니다.
# (publishable 키는 브라우저 노출용이라 공개 저장소에 있어도 안전)
name: keep-supabase-awake

on:
  schedule:
    - cron: "0 6 */3 * *"   # 3일마다 06:00 UTC
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            "https://zoszumqphwfniankrgio.supabase.co/rest/v1/settings?select=id&limit=1" \
            -H "apikey: sb_publishable_zRj6dXRMQ6RJ0hQygLnF1Q_dWy9T9M6"
